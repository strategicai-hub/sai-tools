name: uazapi-monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: uazapi-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore state cache
        id: cache-state
        uses: actions/cache@v4
        with:
          path: state
          key: uazapi-state-${{ github.run_id }}
          restore-keys: |
            uazapi-state-

      - name: Run monitor
        env:
          UAZAPI_URL: ${{ secrets.UAZAPI_URL }}
          UAZAPI_ADMIN_TOKEN: ${{ secrets.UAZAPI_ADMIN_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          STATE_FILE: state/uazapi-state.json
          DEBUG: ${{ vars.UAZAPI_MONITOR_DEBUG || '0' }}
        run: node scripts/uazapi-monitor.mjs
